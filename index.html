<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NITRO DRIFT | THE INSANE EDITION</title>
    <style>
        body {
            margin: 0; background: #050505; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Arial Black', sans-serif;
        }

        /* Screen Shake Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, 2px) rotate(0deg); }
        }

        .shake-active { animation: shake 0.2s infinite; }

        .track {
            position: relative; width: 100%; height: 400px;
            background: #1a1a1a; border-top: 5px solid #333; border-bottom: 5px solid #333;
            overflow: hidden; display: flex; align-items: center;
        }

        /* Tire Marks Layer */
        #skid-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .skid-mark {
            position: absolute; height: 40px; background: rgba(0,0,0,0.5);
            border-radius: 5px; z-index: 1;
        }

        /* The Beast (Car) */
        .car-wrapper {
            position: absolute; left: -200px; z-index: 10;
            transition: transform 0.1s linear;
        }

        .car-body {
            width: 120px; height: 55px; background: #ff1100;
            border-radius: 10px 40px 10px 10px; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Nitro Flame */
        .nitro {
            position: absolute; right: 105%; top: 15px; width: 60px; height: 25px;
            background: linear-gradient(to right, transparent, #00f2fe);
            border-radius: 50%; filter: blur(8px); opacity: 0;
            transition: 0.2s;
        }

        .nitro-active { opacity: 1; transform: scale(1.5); }

        /* Wheels */
        .wheel {
            position: absolute; width: 24px; height: 24px; background: #111;
            border: 4px solid #333; border-radius: 50%; bottom: -12px;
        }
        .front { left: 20px; } .back { right: 20px; }

        /* The Insane Drift Sequence */
        .insane-drift {
            animation: driftMove 4s cubic-bezier(0.1, 0, 0.1, 1) forwards;
        }

        @keyframes driftMove {
            0% { left: -200px; transform: rotate(0deg); }
            20% { left: 20%; transform: rotate(0deg); }
            35% { left: 40%; transform: rotate(-30deg); } /* Entry */
            50% { left: 50%; transform: rotate(360deg); } /* THE SPIN! */
            65% { left: 60%; transform: rotate(-20deg) skewX(10deg); } /* Skid */
            85% { left: 85%; transform: rotate(5deg); }
            100% { left: 80%; transform: rotate(0deg); }
        }

        /* UI Buttons */
        .btn {
            background: #ffea00; color: #000; border: none;
            padding: 20px 60px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; border-radius: 10px; margin-bottom: 20px;
            box-shadow: 0 10px 0 #b3a400; transition: 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b3a400; }
        
        .tagline { color: #555; letter-spacing: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <button class="btn" onclick="igniteEngine()">IGNITE NITRO & DRIFT</button>
    
    <div class="track" id="track">
        <div id="skid-layer"></div>
        <div class="car-wrapper" id="car">
            <div class="nitro" id="nitro"></div>
            <div class="car-body">
                <div class="wheel front"></div>
                <div class="wheel back"></div>
            </div>
        </div>
    </div>

    <div class="tagline">PRESS TO BURN RUBBER</div>

    <script>
        function igniteEngine() {
            const car = document.getElementById('car');
            const nitro = document.getElementById('nitro');
            const track = document.getElementById('track');
            const skidLayer = document.getElementById('skid-layer');

            // Reset
            car.classList.remove('insane-drift');
            document.body.classList.remove('shake-active');
            nitro.classList.remove('nitro-active');
            skidLayer.innerHTML = '';

            setTimeout(() => {
                // Start
                car.classList.add('insane-drift');
                
                // Nitro trigger
                setTimeout(() => {
                    nitro.classList.add('nitro-active');
                    document.body.classList.add('shake-active');
                }, 800);

                // Create skid marks during the spin
                let interval = setInterval(() => {
                    const carPos = car.getBoundingClientRect();
                    if(carPos.left > window.innerWidth) clearInterval(interval);
                    
                    if(carPos.left > 100 && carPos.left < window.innerWidth - 200) {
                        const mark = document.createElement('div');
                        mark.className = 'skid-mark';
                        mark.style.left = (carPos.left + 20) + 'px';
                        mark.style.top = (carPos.top + 40) + 'px';
                        mark.style.width = '30px';
                        skidLayer.appendChild(mark);
                    }
                }, 50);

                // Stop shake
                setTimeout(() => {
                    document.body.classList.remove('shake-active');
                    nitro.classList.remove('nitro-active');
                }, 3500);

            }, 100);
        }
    </script>
</body>
</html>
